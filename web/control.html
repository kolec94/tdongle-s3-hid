<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T-Dongle S3 Keyboard</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:680px;margin:24px auto;padding:0 16px;background:#111;color:#eee}
  h1{font-size:1.3rem} h2{font-size:1rem;color:#9ca3af;margin-top:28px}
  textarea{width:100%;height:150px;font-size:16px;padding:10px;box-sizing:border-box;
           background:#1c1c1c;color:#eee;border:1px solid #444;border-radius:8px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
  button{font-size:15px;padding:10px 16px;border:0;border-radius:8px;cursor:pointer;background:#3b82f6;color:#fff}
  button.alt{background:#374151} button:disabled{opacity:.4;cursor:not-allowed}
  label{display:flex;align-items:center;gap:6px;font-size:14px}
  #log{margin-top:12px;font-size:13px;color:#9ca3af}
  hr{border:0;border-top:1px solid #333;margin:28px 0}
  .hint{font-size:13px;color:#9ca3af}
  a{color:#60a5fa}
  #pad{touch-action:none;height:190px;margin-top:10px;background:#1c1c1c;border:1px dashed #555;
       border-radius:10px;display:flex;align-items:center;justify-content:center;color:#666;
       user-select:none;font-size:14px;text-align:center}
</style>
</head>
<body>
  <h1>T-Dongle S3 — Remote Keyboard</h1>
  <p class="hint">Plug the flashed dongle into the <em>target</em> computer, then connect over BLE (Win/Mac, Chrome/Edge). Need to flash a dongle first? <a href="./index.html">Go to the install page →</a></p>

  <div class="row">
    <button id="conn" onclick="connect()">Connect to dongle</button>
    <span id="status">disconnected</span>
  </div>
  <textarea id="txt" placeholder="Type text to send to the target computer..."></textarea>
  <div class="row">
    <button id="send" onclick="send()" disabled>Send</button>
    <label><input type="checkbox" id="enter" checked> Press Enter after</label>
  </div>
  <div class="row">
    <button class="alt keybtn" onclick="cmd('ENTER')" disabled>Enter</button>
    <button class="alt keybtn" onclick="cmd('TAB')" disabled>Tab</button>
    <button class="alt keybtn" onclick="cmd('ESC')" disabled>Esc</button>
    <button class="alt keybtn" onclick="cmd('WIN')" disabled>Win/Cmd</button>
    <button class="alt keybtn" onclick="cmd('CTRL_ALT_DEL')" disabled>Ctrl+Alt+Del</button>
  </div>
  <h2>Mouse</h2>
  <div id="pad">drag here to move the pointer • tap to left-click</div>
  <div class="row">
    <label>Sensitivity <input type="range" id="sens" min="0.3" max="5" step="0.1" value="1.6" style="vertical-align:middle">
      <span id="sensv">1.6</span>×</label>
  </div>
  <div class="row">
    <button class="alt mousebtn" onclick="mclick(1)" disabled>Left click</button>
    <button class="alt mousebtn" onclick="mclick(2)" disabled>Right click</button>
    <button class="alt mousebtn" onclick="mclick(4)" disabled>Middle</button>
    <button class="alt mousebtn" onclick="mscroll(-3)" disabled>Scroll ↑</button>
    <button class="alt mousebtn" onclick="mscroll(3)" disabled>Scroll ↓</button>
  </div>
  <div class="row">
    <label style="flex:1">Pointer speed
      <input type="range" id="sens" min="0.3" max="5" step="0.1" value="1.6" style="flex:1;min-width:120px">
      <span id="sensv" style="min-width:2.5em;text-align:right">1.6</span>
    </label>
  </div>
  <div id="log"></div>

<script>
const SERVICE='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
let rxChar=null;
function setConnected(on){
  document.getElementById('status').textContent = on?'connected ✓':'disconnected';
  document.getElementById('send').disabled=!on;
  document.querySelectorAll('.keybtn,.mousebtn').forEach(b=>b.disabled=!on);
  document.getElementById('pad').style.opacity = on ? '1' : '0.4';
}
function log(m){ document.getElementById('log').textContent=m; }
async function connect(){
  if(!navigator.bluetooth){ log('Web Bluetooth not supported — use Chrome/Edge.'); return; }
  try{
    const dev=await navigator.bluetooth.requestDevice({filters:[{services:[SERVICE]}]});
    dev.addEventListener('gattserverdisconnected',()=>{setConnected(false);rxChar=null;});
    const server=await dev.gatt.connect();
    const svc=await server.getPrimaryService(SERVICE);
    rxChar=await svc.getCharacteristic(RX);
    setConnected(true); log('connected to '+(dev.name||'device'));
  }catch(e){ log('connect failed: '+e.message); }
}
async function writeChunked(bytes){
  for(let i=0;i<bytes.length;i+=180){ await rxChar.writeValue(bytes.slice(i,i+180)); }
}
async function send(){
  if(!rxChar) return;
  let t=document.getElementById('txt').value;
  if(document.getElementById('enter').checked) t+='\n';
  try{ await writeChunked(new TextEncoder().encode(t)); log('sent ✓'); }
  catch(e){ log('send failed: '+e.message); }
}
async function cmd(name){
  if(!rxChar) return;
  try{ await rxChar.writeValue(new TextEncoder().encode('\x01'+name)); log('sent '+name); }
  catch(e){ log('send failed: '+e.message); }
}

// ---- mouse ----
let SENS = parseFloat(localStorage.getItem('sens') || '1.6');   // pointer sensitivity (slider)
function clamp(v){ v=v|0; return v<-127?-127:v>127?127:v; }
async function mwrite(arr){
  if(!rxChar) return;
  const b=new Uint8Array(arr);
  try{
    if(rxChar.writeValueWithoutResponse) await rxChar.writeValueWithoutResponse(b);
    else await rxChar.writeValue(b);
  }catch(e){}
}
function mmove(dx,dy){ mwrite([2,0x6d,(clamp(dx)+128)&0xff,(clamp(dy)+128)&0xff]); }     // 'm'
function mclick(btn){ mwrite([2,0x63,btn]); log('mouse click'); }                          // 'c'
function mscroll(a){ mwrite([2,0x73,(clamp(a)+128)&0xff]); }                               // 's'

const sens=document.getElementById('sens'), sensv=document.getElementById('sensv');
sens.value=SENS; sensv.textContent=SENS.toFixed(1);
sens.addEventListener('input',()=>{ SENS=parseFloat(sens.value); sensv.textContent=SENS.toFixed(1); localStorage.setItem('sens',sens.value); });

const pad=document.getElementById('pad');
let pDown=false,lx=0,ly=0,ax=0,ay=0,moved=false;
pad.addEventListener('pointerdown',e=>{ if(!rxChar)return; pDown=true;lx=e.clientX;ly=e.clientY;moved=false;
  ax=ay=0; pad.setPointerCapture(e.pointerId); e.preventDefault(); });
pad.addEventListener('pointermove',e=>{ if(!pDown)return;
  ax+=e.clientX-lx; ay+=e.clientY-ly; lx=e.clientX; ly=e.clientY;
  if(Math.abs(ax)>3||Math.abs(ay)>3) moved=true; });
pad.addEventListener('pointerup',e=>{ if(!pDown)return; pDown=false; if(!moved) mclick(1); });
setInterval(()=>{ if(!rxChar||(!ax&&!ay))return;
  const dx=clamp(Math.round(ax*SENS)), dy=clamp(Math.round(ay*SENS));
  ax=0; ay=0; if(dx||dy) mmove(dx,dy); }, 40);
</script>
</body>
</html>
