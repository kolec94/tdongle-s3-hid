<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T-Dongle BLE Keyboard</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:640px;margin:24px auto;padding:0 16px;background:#111;color:#eee}
  h1{font-size:1.2rem}
  textarea{width:100%;height:160px;font-size:16px;padding:10px;box-sizing:border-box;
           background:#1c1c1c;color:#eee;border:1px solid #444;border-radius:8px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  button{font-size:15px;padding:10px 16px;border:0;border-radius:8px;cursor:pointer;background:#3b82f6;color:#fff}
  button.alt{background:#374151}
  button:disabled{opacity:.4;cursor:not-allowed}
  label{display:flex;align-items:center;gap:6px;font-size:14px}
  #log{margin-top:12px;font-size:13px;color:#9ca3af}
</style>
</head>
<body>
  <h1>T-Dongle S3 — BLE Remote Keyboard</h1>
  <div class="row">
    <button id="conn" onclick="connect()">Connect to dongle</button>
    <span id="status">disconnected</span>
  </div>
  <textarea id="txt" placeholder="Type text to send to the target computer..."></textarea>
  <div class="row">
    <button id="send" onclick="send()" disabled>Send</button>
    <label><input type="checkbox" id="enter" checked> Press Enter after</label>
  </div>
  <div class="row">
    <button class="alt keybtn" onclick="cmd('ENTER')" disabled>Enter</button>
    <button class="alt keybtn" onclick="cmd('TAB')" disabled>Tab</button>
    <button class="alt keybtn" onclick="cmd('ESC')" disabled>Esc</button>
    <button class="alt keybtn" onclick="cmd('WIN')" disabled>Win/Cmd</button>
    <button class="alt keybtn" onclick="cmd('CTRL_ALT_DEL')" disabled>Ctrl+Alt+Del</button>
  </div>
  <div id="log"></div>
<script>
const SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
let rxChar = null;

function setConnected(on){
  document.getElementById('status').textContent = on ? 'connected ✓' : 'disconnected';
  document.getElementById('send').disabled = !on;
  document.querySelectorAll('.keybtn').forEach(b => b.disabled = !on);
}
function log(m){ document.getElementById('log').textContent = m; }

async function connect(){
  if(!navigator.bluetooth){ log('Web Bluetooth not supported — use Chrome/Edge.'); return; }
  try{
    const dev = await navigator.bluetooth.requestDevice({ filters:[{ services:[SERVICE] }] });
    dev.addEventListener('gattserverdisconnected', () => { setConnected(false); rxChar = null; });
    const server = await dev.gatt.connect();
    const svc = await server.getPrimaryService(SERVICE);
    rxChar = await svc.getCharacteristic(RX);
    setConnected(true);
    log('connected to ' + (dev.name || 'device'));
  }catch(e){ log('connect failed: ' + e.message); }
}

async function writeChunked(bytes){
  for(let i=0;i<bytes.length;i+=180){
    await rxChar.writeValue(bytes.slice(i, i+180));   // with-response keeps ordering
  }
}
async function send(){
  if(!rxChar) return;
  let t = document.getElementById('txt').value;
  if(document.getElementById('enter').checked) t += '\n';
  try{ await writeChunked(new TextEncoder().encode(t)); log('sent ✓'); }
  catch(e){ log('send failed: ' + e.message); }
}
async function cmd(name){
  if(!rxChar) return;
  try{ await rxChar.writeValue(new TextEncoder().encode('\x01' + name)); log('sent ' + name); }
  catch(e){ log('send failed: ' + e.message); }
}
</script>
</body>
</html>
